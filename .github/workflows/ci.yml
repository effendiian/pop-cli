name: CI

on:
    pull_request:
    push:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install uv@v7 and setup python
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: 3.14

            - run: uv sync --dev

            - run: uv run pre-commit run --all-files --show-diff-on-failure

            # - run: uv run pytest
